name: Android CI

on:
  push:
    branches: [ "main", "dev", "release/*" ]
  pull_request:
    branches: [ "main", "dev", "release/*" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Determine Gradle Warning Mode
      run: |
        if [[ "${{ github.ref_name }}" == release/* ]]; then
          echo "WARNING_MODE=--warning-mode all" >> $GITHUB_ENV
        else
          echo "WARNING_MODE=--warning-mode none" >> $GITHUB_ENV
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug --configuration-cache ${{ env.WARNING_MODE }}

    - name: Rename and Upload APK Artifact
      run: |
        BRANCH_NAME="${{ github.ref_name }}"
        RUN_NUM="${{ github.run_number }}"

        if [[ $BRANCH_NAME == release/* ]]; then
          VERSION="${BRANCH_NAME#release/}"
          # Calculate RC number based on commits since branching from dev
          BASE_COMMIT=$(git merge-base origin/dev HEAD)
          RC_NUM=$(git rev-list --count $BASE_COMMIT..HEAD)
          RC_NUM=$((RC_NUM + 1))

          FILENAME="FileMan-${VERSION}-RC${RC_NUM}.apk"
          ARTIFACT_NAME="FileMan-${VERSION}-RC${RC_NUM}"
        elif [ "$BRANCH_NAME" == "main" ]; then
          FILENAME="FileMan.apk"
          ARTIFACT_NAME="FileMan-latest"
        else
          # dev, groom, or other branches
          SAFE_NAME="${BRANCH_NAME//\//-}"
          FILENAME="FileMan-${SAFE_NAME}-build-${RUN_NUM}.apk"
          ARTIFACT_NAME="FileMan-${SAFE_NAME}-build-${RUN_NUM}"
        fi

        echo "APK_FILENAME=$FILENAME" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

        cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/$FILENAME"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: app/build/outputs/apk/debug/${{ env.APK_FILENAME }}

    - name: Upload Problems Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Gradle Problems Report ${{ github.run_number }}
        path: app/build/reports/problems/
        if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Determine Gradle Warning Mode
      run: |
        if [[ "${{ github.ref_name }}" == release/* ]]; then
          echo "WARNING_MODE=--warning-mode all" >> $GITHUB_ENV
        else
          echo "WARNING_MODE=--warning-mode none" >> $GITHUB_ENV
        fi

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --configuration-cache ${{ env.WARNING_MODE }}

    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: unit-test-results-${{ github.run_number }}
        path: |
          app/build/test-results/testDebugUnitTest/
          app/build/reports/tests/testDebugUnitTest/

    - name: Generate Coverage Report
      run: ./gradlew koverXmlReportDebug --configuration-cache ${{ env.WARNING_MODE }}

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ github.run_number }}
        path: app/build/reports/kover/

    - name: Upload Problems Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Gradle Problems Report ${{ github.run_number }}
        path: app/build/reports/problems/
        if-no-files-found: ignore

  static-analysis:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Determine Gradle Warning Mode
      run: |
        if [[ "${{ github.ref_name }}" == release/* ]]; then
          echo "WARNING_MODE=--warning-mode all" >> $GITHUB_ENV
        else
          echo "WARNING_MODE=--warning-mode none" >> $GITHUB_ENV
        fi

    - name: Run Static Analysis (Detekt)
      run: ./gradlew detekt --configuration-cache ${{ env.WARNING_MODE }}

    - name: Upload Detekt Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: detekt-report-${{ github.run_number }}
        path: app/build/reports/detekt/

    - name: Run Lint
      run: ./gradlew lintDebug --configuration-cache ${{ env.WARNING_MODE }}

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: lint-report-${{ github.run_number }}
        path: |
          app/build/reports/lint-results-debug.html
          app/build/reports/lint-results-debug.xml

    - name: Upload Problems Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Gradle Problems Report ${{ github.run_number }}
        path: app/build/reports/problems/
        if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Determine Gradle Warning Mode
      run: |
        if [[ "${{ github.ref_name }}" == release/* ]]; then
          echo "WARNING_MODE=--warning-mode all" >> $GITHUB_ENV
        else
          echo "WARNING_MODE=--warning-mode none" >> $GITHUB_ENV
        fi

    - name: Run Dependency Vulnerability Scan
      run: ./gradlew dependencyCheckAnalyze --configuration-cache ${{ env.WARNING_MODE }}
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload Dependency Check Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: dependency-check-report-${{ github.run_number }}
        path: app/build/reports/dependency-check-report.html

    - name: Upload Problems Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Gradle Problems Report ${{ github.run_number }}
        path: app/build/reports/problems/
        if-no-files-found: ignore
